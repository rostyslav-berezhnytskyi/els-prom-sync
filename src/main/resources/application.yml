server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: els-prom-sync

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}

app:
  exchange-rate: ${APP_EXCHANGE_RATE:44.5}
  use-monobank-rate: ${APP_USE_MONOBANK_RATE:true}
  ai-enabled: ${APP_AI_ENABLED:true}
  run-once: ${APP_RUN_ONCE:false}
  ai-backfill-missing: ${APP_AI_BACKFILL_MISSING:false}

  dealer-code: ${APP_DEALER_CODE:SOLAR_VERSE}
  detect-missing-products: ${APP_DETECT_MISSING_PRODUCTS:false}
  missing-products-min-seen-skus: ${APP_MISSING_PRODUCTS_MIN_SEEN_SKUS:100}

telegram:
  enabled: ${TELEGRAM_ENABLED:true}
  bot-token: ${TELEGRAM_BOT_TOKEN}
  chat-id: ${TELEGRAM_CHAT_ID}

pricing:
  panel-markup: ${PRICING_PANEL_MARKUP:1.12}
  cable-markup: ${PRICING_CABLE_MARKUP:1.12}

  cheap-price-usd: ${PRICING_CHEAP_PRICE_USD:200}
  standard-price-usd: ${PRICING_STANDARD_PRICE_USD:600}
  high-price-usd: ${PRICING_HIGH_PRICE_USD:2000}
  max-price-usd: ${PRICING_MAX_PRICE_USD:6000}

  cheap-markup: ${PRICING_CHEAP_MARKUP:1.35}
  standard-markup: ${PRICING_STANDARD_MARKUP:1.15}
  min-markup: ${PRICING_MIN_MARKUP:1.08}

google:
  sheets:
    spreadsheet-id: ${DEALER_SPREADSHEET_ID}
    credentials-file: ${GOOGLE_CREDENTIALS_FILE:credentials.json}
    tokens-dir: ${GOOGLE_TOKENS_DIR:tokens}
    start-row: ${GOOGLE_SHEETS_START_ROW:12}
    end-row: ${GOOGLE_SHEETS_END_ROW:1000}

openai:
  api-key: ${OPENAI_API_KEY}
  model: ${OPENAI_MODEL}
  retry:
    max-attempts: ${OPENAI_RETRY_MAX_ATTEMPTS:3}
    first-delay-ms: ${OPENAI_RETRY_FIRST_DELAY_MS:3000}
    second-delay-ms: ${OPENAI_RETRY_SECOND_DELAY_MS:10000}

media:
  products-dir: ${MEDIA_PRODUCTS_DIR:/home/admin_els/els-media/products}
  public-base-url: ${MEDIA_PUBLIC_BASE_URL:https://elsserver.tailaf01c4.ts.net/images/products}
  max-images-per-product: ${MEDIA_MAX_IMAGES_PER_PRODUCT:10}

feed:
  output-file: ${FEED_OUTPUT_FILE:/home/admin_els/els-media/feed/prom.xml}

prom:
  price-rounding-step-uah: ${PROM_PRICE_ROUNDING_STEP_UAH:10}
  commission-threshold-uah: ${PROM_COMMISSION_THRESHOLD_UAH:10000}
  reduced-commission-percent: ${PROM_REDUCED_COMMISSION_PERCENT:2}

  commission-percent:
    solar-panels: ${PROM_COMMISSION_SOLAR_PANELS:8.59}
    battery-lv: ${PROM_COMMISSION_BATTERY_LV:8.59}
    battery-hv: ${PROM_COMMISSION_BATTERY_HV:8.59}
    hybrid-inverters: ${PROM_COMMISSION_HYBRID_INVERTERS:8.59}
    grid-inverters: ${PROM_COMMISSION_GRID_INVERTERS:8.59}
    autonomous-inverters: ${PROM_COMMISSION_AUTONOMOUS_INVERTERS:8.59}
    solar-cable: ${PROM_COMMISSION_SOLAR_CABLE:8.59}
    bess: ${PROM_COMMISSION_BESS:8.59}
    inverter-meters: ${PROM_COMMISSION_INVERTER_METERS:8.59}
    battery-bms: ${PROM_COMMISSION_BATTERY_BMS:8.59}
    battery-racks: ${PROM_COMMISSION_BATTERY_RACKS:8.59}
    bess-accessories: ${PROM_COMMISSION_BESS_ACCESSORIES:8.59}
    uncategorized: ${PROM_COMMISSION_UNCATEGORIZED:8.59}

logging:
  file:
    name: ${LOG_FILE:logs/els-prom-sync.log}

  level:
    root: INFO
    com.els.promsync: INFO
    org.hibernate.SQL: WARN

  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 14
      total-size-cap: 200MB