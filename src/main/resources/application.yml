server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: els-prom-sync

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}

app:
  exchange-rate: ${APP_EXCHANGE_RATE:44.5}
  use-monobank-rate: ${APP_USE_MONOBANK_RATE:true}
  ai-enabled: ${APP_AI_ENABLED:true}
  run-once: ${APP_RUN_ONCE:false}

  dealer-code: ${APP_DEALER_CODE:SOLAR_VERSE}
  detect-missing-products: ${APP_DETECT_MISSING_PRODUCTS:false}
  missing-products-min-seen-skus: ${APP_MISSING_PRODUCTS_MIN_SEEN_SKUS:100}

telegram:
  enabled: ${TELEGRAM_ENABLED:true}
  bot-token: ${TELEGRAM_BOT_TOKEN}
  chat-id: ${TELEGRAM_CHAT_ID}

pricing:
  panel-markup: ${PRICING_PANEL_MARKUP:1.12}
  cable-markup: ${PRICING_CABLE_MARKUP:1.12}

  cheap-price-usd: ${PRICING_CHEAP_PRICE_USD:200}
  standard-price-usd: ${PRICING_STANDARD_PRICE_USD:600}
  high-price-usd: ${PRICING_HIGH_PRICE_USD:2000}
  max-price-usd: ${PRICING_MAX_PRICE_USD:6000}

  cheap-markup: ${PRICING_CHEAP_MARKUP:1.35}
  standard-markup: ${PRICING_STANDARD_MARKUP:1.15}
  min-markup: ${PRICING_MIN_MARKUP:1.08}

google:
  sheets:
    spreadsheet-id: ${DEALER_SPREADSHEET_ID}
    credentials-file: ${GOOGLE_CREDENTIALS_FILE:credentials.json}
    tokens-dir: ${GOOGLE_TOKENS_DIR:tokens}

openai:
  api-key: ${OPENAI_API_KEY}

media:
  products-dir: ${MEDIA_PRODUCTS_DIR:/home/admin_els/els-media/products}
  public-base-url: ${MEDIA_PUBLIC_BASE_URL:https://elsserver.tailaf01c4.ts.net/images/products}
  max-images-per-product: ${MEDIA_MAX_IMAGES_PER_PRODUCT:10}

feed:
  output-file: ${FEED_OUTPUT_FILE:/home/admin_els/els-media/feed/prom.xml}